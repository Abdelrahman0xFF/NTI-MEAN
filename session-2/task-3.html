<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Task-3</title>
    </head>
    <body
        class="bg-gray-50 min-h-screen text-gray-900 flex flex-col items-center pt-20 px-4"
    >
        <div class="w-full max-w-5xl flex flex-col gap-6">
            <div class="flex flex-row gap-2">
                <input
                    type="text"
                    id="input"
                    placeholder="Search for a meal (e.g., chicken, pasta)..."
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 shadow-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-3 focus:ring-blue-100 transition-all duration-200"
                />
                <button
                    id="searchButton"
                    class="bg-blue-600 text-white font-medium px-5 py-2 rounded-lg shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200"
                >
                    Search
                </button>
            </div>

            <div
                id="result-container"
                class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 w-full min-h-[150px] flex flex-col"
            >
                <div
                    id="result"
                    class="text-gray-500 font-medium text-center flex-1 flex items-center justify-center"
                >
                    Please enter a search term
                </div>
            </div>
        </div>

        <script>
            async function returnData(searchTerm) {
                try {
                    const response = await fetch(
                        `https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(searchTerm)}`,
                    );
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error("Error fetching data:", error);
                    return null;
                }
            }

            const input = document.getElementById("input");
            const searchButton = document.getElementById("searchButton");
            const resultContainer = document.getElementById("result-container");

            searchButton.addEventListener("click", async () => {
                const searchTerm = input.value.trim();

                if (!searchTerm) {
                    resultContainer.innerHTML = `
                        <div class="text-gray-500 font-medium text-center flex-1 flex items-center justify-center h-full">
                            Enter a search term
                        </div>`;
                    return;
                }

                resultContainer.innerHTML = `
                    <div class="text-blue-500 font-medium text-center flex-1 flex items-center justify-center h-full animate-pulse">
                        Searching for "${searchTerm}"...
                    </div>`;

                const data = await returnData(searchTerm);

                if (data && data.meals) {
                    const mealsHTML = data.meals
                        .map(
                            (meal) => `
                        <div class="flex flex-col gap-3 p-4 border border-gray-100 rounded-lg hover:shadow-md transition-shadow bg-gray-50/50">
                            <img src="${meal.strMealThumb}" alt="${meal.strMeal}" class="w-full h-48 object-cover rounded-md shadow-sm">
                            <div>
                                <h3 class="font-bold text-lg text-gray-900 leading-tight">${meal.strMeal}</h3>
                            </div>
                        </div>
                    `,
                        )
                        .join("");

                    resultContainer.innerHTML = `
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                            ${mealsHTML}
                        </div>
                    `;
                } else {
                    resultContainer.innerHTML = `
                        <div class="text-red-500 font-medium text-center flex-1 flex items-center justify-center h-full">
                            No meals found for "${searchTerm}". Try another ingredient!
                        </div>`;
                }
            });
        </script>
    </body>
</html>
